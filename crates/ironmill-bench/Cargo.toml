[package]
name = "ironmill-bench"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[[bin]]
name = "ironmill-bench"
path = "src/main.rs"

[dependencies]
mil-rs = { workspace = true }
ironmill-compile = { workspace = true }
ironmill-coreml-sys = { workspace = true }
ironmill-inference = { path = "../ironmill-inference", optional = true }
ironmill-iosurface = { path = "../ironmill-iosurface", optional = true }
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
anyhow = { workspace = true }
statrs = { workspace = true }
half = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = []
ane-direct = ["dep:ironmill-inference", "dep:ironmill-iosurface"]
