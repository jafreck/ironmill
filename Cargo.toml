[workspace]
members = ["crates/mil-rs", "crates/coreml-kit-cli"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/jfreck/coreml-kit"
rust-version = "1.85"

[workspace.dependencies]
mil-rs = { path = "crates/mil-rs" }
prost = "0.13"
prost-build = "0.13"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"
indexmap = "2"
