# Qwen 3.5-4B Metal GPU Benchmark Suite
#
# Compares FP16 baseline against quantized inference configurations:
#   1. FP16 baseline  – no weight/KV quantization
#   2. FP16 + TQ-INT8 – FP16 weights, TurboQuant INT8 KV cache
#   3. FP16 + TQ-INT4 – FP16 weights, TurboQuant INT4 KV cache
#   4. D2Q-3 + TQ-INT8 – D2Quant 3-bit weights + DAC, TurboQuant INT8 KV cache
#   5. INT4 + TQ-INT8  – INT4 affine weights, TurboQuant INT8 KV cache
#
# Reproduce:
#   cargo run --release -p ironmill-bench --features metal -- \
#     --config configs/qwen35-4b-optimization-matrix.toml -b metal \
#     --baseline fp16-baseline \
#     -i 20 -w 5 -r 3 \
#     --perplexity --perplexity-sequences 1 \
#     --perplexity-dataset tests/fixtures/quality/wikitext2-qwen35.json

[[model]]
name = "Qwen3.5-4B"
path = "unused-for-template-mode"
model_dir = "models/Qwen3.5-4B"

# ── 1. FP16 baseline: no quantization, no KV cache compression ──
[[optimization]]
name = "fp16-baseline"
no_fusion = false
kv_quant = "none"
max_seq_len = 2048

# ── 2. FP16 weights + TurboQuant INT8 KV cache ──────────────────
[[optimization]]
name = "fp16-tq-int8"
no_fusion = false
kv_quant = "turbo-int8"
max_seq_len = 2048

# ── 3. FP16 weights + TurboQuant INT4 KV cache ──────────────────
[[optimization]]
name = "fp16-tq-int4"
no_fusion = false
kv_quant = "turbo-int4"
max_seq_len = 2048

# ── 4. D2Quant 3-bit weights + TurboQuant INT8 KV cache ─────────
[[optimization]]
name = "d2q3-tq-int8"
d2quant = 3
kv_quant = "turbo-int8"
max_seq_len = 2048

# ── 5. INT4 affine weights + TurboQuant INT8 KV cache ───────────
[[optimization]]
name = "int4-tq-int8"
int4 = true
kv_quant = "turbo-int8"
max_seq_len = 2048

[settings]
iterations = 20
warmup = 5
runs = 3
backends = ["metal"]
