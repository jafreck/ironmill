# Qwen 3.5-4B kernel performance validation
#
# Minimal config for validating Metal kernel changes (K-tile, AMX decode,
# barriers). Covers the two weight formats relevant to the perf plan:
#   1. INT4 affine + TQ-INT8 KV cache (primary target)
#   2. D2Quant 3-bit + TQ-INT8 KV cache
#
# Decode throughput:
#   cargo run --release -p ironmill-bench --features metal -- \
#     --config configs/qwen35-4b-kernel-perf.toml -b metal -i 20 -w 5 -r 3
#
# Prefill throughput:
#   cargo run --release -p ironmill-bench --features metal -- \
#     --config configs/qwen35-4b-kernel-perf.toml -b metal -i 20 -w 5 -r 3 \
#     --prefill-bench
#
# PPL regression (must not regress beyond ±0.05 of baseline):
#   cargo run --release -p ironmill-bench --features metal -- \
#     --config configs/qwen35-4b-kernel-perf.toml -b metal \
#     --perplexity --perplexity-sequences 1 \
#     --perplexity-dataset tests/fixtures/quality/wikitext2-qwen35.json

[[model]]
name = "Qwen3.5-4B"
path = "unused-for-template-mode"
model_dir = "models/Qwen3.5-4B"

# ── INT4 affine weights + TurboQuant INT8 KV cache ───────────────
[[optimization]]
name = "int4-tq-int8"
int4 = true
kv_quant = "turbo-int8"
max_seq_len = 512

# ── D2Quant 3-bit weights + TurboQuant INT8 KV cache ─────────────
[[optimization]]
name = "d2q3-tq-int8"
d2quant = 3
kv_quant = "turbo-int8"
max_seq_len = 512

[settings]
iterations = 20
warmup = 5
runs = 3
backends = ["metal"]
