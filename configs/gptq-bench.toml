# GPTQ Quantization Benchmark — Qwen3-0.6B
#
# Replaces the former tests/gptq_bench.rs test file.
# Benchmarks GPTQ-quantized model decode throughput and perplexity.
#
# Requires: --features metal,gptq
#
# Reproduce:
#   cargo run --release -p ironmill-bench --features metal,gptq -- \
#     --config configs/gptq-bench.toml -b metal \
#     -i 20 -w 5 -r 3 \
#     --perplexity --perplexity-sequences 5

[[model]]
name = "Qwen3-0.6B"
path = "unused-for-template-mode"
model_dir = "models/Qwen3-0.6B"

# ── FP16 baseline ───────────────────────────────────────────────
[[optimization]]
name = "fp16-baseline"
no_fusion = false
kv_quant = "none"
max_seq_len = 2048

# ── GPTQ INT4 ──────────────────────────────────────────────────
[[optimization]]
name = "int4"
int4 = true
kv_quant = "none"
max_seq_len = 2048

[settings]
iterations = 20
warmup = 5
runs = 3
backends = ["metal"]

[benchmarks]
suites = ["decode"]
perplexity = true
perplexity_sequences = 5
